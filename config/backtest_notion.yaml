pipeline:
  market_category: "note-taking and workspace"
  output_dir: "data"
  random_seed: 42

collection:
  date_range:
    start: "2017-03-01"
    end: "2018-02-28"
  exa:
    enabled: false
  serper:
    enabled: false
  apify:
    enabled: false
  arctic_shift:
    enabled: true
    # Discovery-derived: Exa probe 2026-02-21 for "note-taking frustration"
    # confluence removed (Exa freq: 0, Arctic Shift volume: 5)
    # pkms/obsidianmd skipped (didn't exist in 2017)
    subreddits:
      - "evernote"         # Exa freq: 38, primary target
      - "productivity"     # Exa freq: 19, general app frustration
      - "notetaking"       # Exa freq: 5, directly relevant
      - "macapps"          # Exa freq: 4, app discovery/complaints
      - "onenote"          # competing product frustration
      - "standardnotes"    # Exa freq: 2, Evernote alternative community
      - "selfhosted"       # Exa freq: 2, self-hosted alternatives
      - "gtd"              # Exa freq: 1, productivity methodology
    max_items: 20000
  hackernews:
    # Exa probe returned 40 HN results for Evernote frustration
    enabled: true
    queries:
      - "evernote"
      - "evernote alternative"
      - "note taking app"
      - "evernote frustration"
      - "evernote pricing"
    max_items: 5000

preprocessing:
  min_length: 50
  max_length: 10000
  language: "en"
  minhash_threshold: 0.8
  minhash_num_perm: 128

embedding:
  model_name: "all-MiniLM-L6-v2"
  batch_size: 256
  device: "cpu"
  post_relevance_threshold: 0.20

clustering:
  umap:
    n_neighbors: 15
    n_components: 5
    min_dist: 0.0
    metric: "cosine"
  hdbscan:
    min_cluster_size: 15
    min_samples: 5
    metric: "euclidean"
  nr_topics: 60
  top_n_words: 10

classification:
  zero_shot:
    model_name: "facebook/bart-large-mnli"
    categories:
      - "pain point"
      - "feature request"
      - "praise"
      - "question"
      - "bug report"
    batch_size: 32
  llm_extraction:
    enabled: true
    model: "gpt-4o-mini"
    samples_per_cluster: 75
    max_clusters: 50
    use_batch_api: true

scoring:
  weights:
    unaddressedness: 0.30
    frequency: 0.25
    pain_intensity: 0.15
    competitive_whitespace: 0.15
    market_size: 0.10
    trend_direction: 0.05
  similarity_threshold: 0.5
  top_n_opportunities: 10
  competitor_features_file: "config/competitor_features/evernote_2017.yaml"
  market_relevance_threshold: 0.45
  min_signal_ratio: 0.25
  unaddressedness_floor: 0.15
  market_anchors:
    - "evernote is too expensive and keeps raising prices"
    - "note taking app sync is unreliable and loses my data"
    - "evernote is bloated and slow compared to simpler alternatives"
    - "looking for a better way to organize notes and documents for my team"
    - "frustrated with evernote device limit on free plan"
    - "need a workspace that combines notes docs and project management"

report:
  format: "markdown"
  max_quotes_per_gap: 20
