competitor_name: "Jira"
features:
  - "Scrum and Kanban boards for sprint planning and task tracking, drag and drop cards between columns"
  - "Customizable issue types, fields, and workflow states — some users find the configuration complex and overwhelming"
  - "Permission schemes and role-based access control for enterprise teams and organizations"
  - "Marketplace with thousands of plugins and add-ons to extend Jira functionality"
  - "JQL query language for advanced issue search and filtering, powerful but has a learning curve"
  - "Sprint planning with backlog grooming, velocity charts, and burndown tracking for agile teams"
  - "Integration with Bitbucket, GitHub, CI/CD pipelines, and developer tools"
  - "Epics, portfolio tracking, and cross-project visibility for managing large initiatives"
  - "Jira is known for being slow and bloated, especially on large projects with many issues"
  - "Jira has a steep learning curve and complex UI that frustrates developers who just want simple issue tracking"
  - "Jira workflow configuration requires admin expertise, making it hard for small teams to set up"
  - "Jira pricing per user adds up for larger teams, especially with required plugins"
