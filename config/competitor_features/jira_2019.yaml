competitor_name: "Jira"
features:
  - "Scrum and Kanban boards for sprint planning and task tracking with drag and drop card management"
  - "Customizable issue types, custom fields, and configurable workflow states and transitions"
  - "Enterprise permission schemes and role-based access control for large organizations"
  - "Marketplace with thousands of plugins and add-ons extending core functionality"
  - "JQL query language for advanced issue search, filtering, and saved filters"
  - "Sprint planning with backlog management, velocity charts, and burndown reporting"
  - "Native integration with Bitbucket, GitHub, and CI/CD pipeline tooling"
  - "Epics and cross-project portfolio tracking for managing large initiative hierarchies"
  - "Configurable dashboards with gadgets for project status and team metrics"
  - "Audit logs, compliance reporting, and data residency controls for enterprise requirements"
