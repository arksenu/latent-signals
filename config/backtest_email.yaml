pipeline:
  market_category: "email clients"
  output_dir: "data"
  random_seed: 42

collection:
  date_range:
    start: "2018-01-01"
    end: "2019-12-31"
  exa:
    enabled: false
  serper:
    enabled: false
  apify:
    enabled: false
  arctic_shift:
    enabled: true
    # Negative control case — no major disruptive email product launched
    # in this window (HEY shipped June 2020, after the window closes).
    # Discovery-derived: Exa probe 2026-02-23 for "email client frustration"
    subreddits:
      - "degoogle"         # Exa freq: 10, anti-Google sentiment
      - "privacy"          # Exa freq: 9, privacy-focused email discussion
      - "productivity"     # Exa freq: 8, email workflow/overload
      - "protonmail"       # Exa freq: 8, Gmail alternative community
      - "selfhosted"       # Exa freq: 6, self-hosted email demand
      - "gmail"            # Exa freq: 2, primary incumbent frustration
      - "email"            # backtest plan spec, general email discussion
      - "gtd"              # Exa freq: 4, inbox zero / email productivity
      - "outlook"          # Exa freq: 2, Microsoft email client
      - "thunderbird"      # Exa freq: 1, open-source email client
    max_items: 15000
  hackernews:
    # Exa probe returned 40 HN results for email client/alternative queries
    enabled: true
    queries:
      - "email client"
      - "email alternative"
      - "Gmail frustration"
      - "email is broken"
      - "Gmail alternative"
    max_items: 5000

preprocessing:
  min_length: 50
  max_length: 10000
  language: "en"
  minhash_threshold: 0.8
  minhash_num_perm: 128

embedding:
  model_name: "all-MiniLM-L6-v2"
  batch_size: 256
  device: "cpu"

clustering:
  umap:
    n_neighbors: 15
    n_components: 5
    min_dist: 0.0
    metric: "cosine"
  hdbscan:
    min_cluster_size: 15
    min_samples: 5
    metric: "euclidean"
  nr_topics: 60
  top_n_words: 10

classification:
  zero_shot:
    model_name: "facebook/bart-large-mnli"
    categories:
      - "pain point"
      - "feature request"
      - "praise"
      - "question"
      - "bug report"
    batch_size: 32
  llm_extraction:
    enabled: true
    model: "gpt-4o-mini"
    samples_per_cluster: 75
    max_clusters: 50
    use_batch_api: true

scoring:
  weights:
    unaddressedness: 0.30
    frequency: 0.25
    pain_intensity: 0.15
    competitive_whitespace: 0.15
    market_size: 0.10
    trend_direction: 0.05
  similarity_threshold: 0.5
  top_n_opportunities: 10
  competitor_features_file: "config/competitor_features/gmail_2018.yaml"
  market_relevance_threshold: 0.45
  min_signal_ratio: 0.25
  market_anchors:
    - "Gmail is too invasive and reads my emails for ad targeting"
    - "frustrated with email overload and inbox management"
    - "need a better email client that respects privacy"
    - "email is broken and needs a fundamental rethink"
    - "looking for an email app with better workflow and task management"
    - "tired of Google locking me into their ecosystem for email"

report:
  format: "markdown"
  max_quotes_per_gap: 20
