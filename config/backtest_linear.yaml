pipeline:
  market_category: "project management"
  output_dir: "data"
  random_seed: 42

collection:
  date_range:
    start: "2018-09-01"
    end: "2019-08-31"
  exa:
    enabled: false
  serper:
    enabled: false
  apify:
    enabled: false
  arctic_shift:
    enabled: true
    # Discovery-derived: Exa probe 2026-02-19 surfaced these subreddits
    # for "project management frustration" queries. webdev and
    # softwareengineering were NOT surfaced and are removed.
    subreddits:
      - "jira"              # Exa freq: 4, direct target
      - "projectmanagement" # Exa freq: 8, highest relevance
      - "experienceddevs"   # Exa freq: 7, dev frustration hub
      - "atlassian"         # Exa freq: 7, vendor-specific complaints
      - "agile"             # Exa freq: 6, methodology frustration
      - "devops"            # Exa freq: 5, tooling complaints
      - "programming"       # Exa freq: 7, general dev discussion
      - "sysadmin"          # Exa freq: 3, ops perspective
      - "cscareerquestions"  # Exa freq: 3, career/tooling frustration
      - "scrum"             # Exa freq: 1, methodology-specific
    max_items: 15000
  hackernews:
    # Exa probe returned 40 HN results — richest concentrated source
    # of Jira frustration signal. Enabling with discovery-derived queries.
    enabled: true
    queries:
      - "jira"
      - "jira alternative"
      - "project management"
      - "jira slow"
      - "jira frustration"
    max_items: 5000

preprocessing:
  min_length: 50
  max_length: 10000
  language: "en"
  minhash_threshold: 0.8
  minhash_num_perm: 128

embedding:
  model_name: "all-MiniLM-L6-v2"
  batch_size: 256
  device: "cpu"

clustering:
  umap:
    n_neighbors: 15
    n_components: 5
    min_dist: 0.0
    metric: "cosine"
  hdbscan:
    min_cluster_size: 15
    min_samples: 5
    metric: "euclidean"
  nr_topics: 60
  top_n_words: 10

classification:
  zero_shot:
    model_name: "facebook/bart-large-mnli"
    categories:
      - "pain point"
      - "feature request"
      - "praise"
      - "question"
      - "bug report"
    batch_size: 32
  llm_extraction:
    enabled: true
    model: "gpt-4o-mini"
    samples_per_cluster: 75
    max_clusters: 50
    use_batch_api: true

scoring:
  weights:
    unaddressedness: 0.30
    frequency: 0.25
    pain_intensity: 0.15
    competitive_whitespace: 0.15
    market_size: 0.10
    trend_direction: 0.05
  similarity_threshold: 0.5
  top_n_opportunities: 10
  competitor_features_file: "config/competitor_features/jira_2019.yaml"
  market_relevance_threshold: 0.45
  min_signal_ratio: 0.25
  market_anchors:
    - "jira is slow and takes forever to load pages"
    - "issue tracker software is too complicated to configure"
    - "project management tool is bloated and hard to use"
    - "bug tracker workflow is confusing and frustrating"
    - "why does this project management app crash and lag so much"
    - "switching from jira to a simpler tool for tracking tasks"

report:
  format: "markdown"
  max_quotes_per_gap: 20
