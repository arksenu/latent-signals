pipeline:
  market_category: "web analytics"
  output_dir: "data"
  random_seed: 42

collection:
  date_range:
    start: "2018-01-01"
    end: "2018-12-31"
  exa:
    enabled: false
  serper:
    enabled: false
  apify:
    enabled: false
  arctic_shift:
    enabled: true
    # Discovery-derived: Exa probe 2026-02-23 for "Google Analytics privacy frustration"
    # webflow skipped (Arctic Shift volume: ~103, too thin)
    subreddits:
      - "googleanalytics"   # Exa freq: 16, primary target
      - "webdev"            # Exa freq: 8, GDPR compliance discussions
      - "analytics"         # Exa freq: 7, general analytics frustration
      - "privacy"           # Exa freq: 6, privacy-first tooling demand
      - "opensource"        # Exa freq: 3, open source alternatives
      - "degoogle"          # Exa freq: 2, anti-Google sentiment
      - "selfhosted"        # Exa freq: 2, self-hosted analytics demand
      - "gdpr"              # Exa freq: 0 but directly relevant to signal
      - "wordpress"         # Exa freq: 1, GDPR-friendly GA alternatives thread
      - "bigseo"            # Exa freq: 1, GA compliance concerns
    max_items: 25000
  hackernews:
    # Exa probe returned 40 HN results for GA privacy/alternative queries
    enabled: true
    queries:
      - "google analytics"
      - "google analytics alternative"
      - "GDPR analytics"
      - "simple web analytics"
      - "privacy analytics"
    max_items: 5000

preprocessing:
  min_length: 50
  max_length: 10000
  language: "en"
  minhash_threshold: 0.8
  minhash_num_perm: 128

embedding:
  model_name: "all-MiniLM-L6-v2"
  batch_size: 256
  device: "cpu"

clustering:
  umap:
    n_neighbors: 15
    n_components: 5
    min_dist: 0.0
    metric: "cosine"
  hdbscan:
    min_cluster_size: 15
    min_samples: 5
    metric: "euclidean"
  nr_topics: 60
  top_n_words: 10

classification:
  zero_shot:
    model_name: "facebook/bart-large-mnli"
    categories:
      - "pain point"
      - "feature request"
      - "praise"
      - "question"
      - "bug report"
    batch_size: 32
  llm_extraction:
    enabled: true
    model: "gpt-4o-mini"
    samples_per_cluster: 75
    max_clusters: 50
    use_batch_api: true

scoring:
  weights:
    unaddressedness: 0.30
    frequency: 0.25
    pain_intensity: 0.15
    competitive_whitespace: 0.15
    market_size: 0.10
    trend_direction: 0.05
  similarity_threshold: 0.5
  top_n_opportunities: 10
  competitor_features_file: "config/competitor_features/google_analytics_2018.yaml"
  market_relevance_threshold: 0.45
  min_signal_ratio: 0.25
  market_anchors:
    - "Google Analytics tracks too much personal data and violates GDPR"
    - "need a simple privacy-friendly alternative to Google Analytics"
    - "Google Analytics is too complex for basic website traffic stats"
    - "GDPR compliance requires cookie consent banners because of Google Analytics"
    - "looking for lightweight analytics that does not use cookies"
    - "frustrated with Google Analytics setup and configuration complexity"

report:
  format: "markdown"
  max_quotes_per_gap: 20
